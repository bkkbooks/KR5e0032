front:
  text: 道典論卷之一姑一
  hash: sha256:75f4580c88351aac0ce4312726fa2ce76b4201235b0e1bac46428a445087a2d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0032_HFL_001-001a, image: hfl/0764/0764-004.png}
body:
  text: 太君紫虛三元紫精君形長九千萬丈春三月頭建九元飛晨纓冠衣丹錦飛裙佩九天龍文虎書帶日精育延之劎足立五色蓮華頭圓七寶之光夏三月則變形為童子頽雲角髻衣五色綵衣手執華幡光明焕爛照明上清秋三月則變形為龍頭蛇軀青黃焕爛光耀玉虛冬三月則變形為紫青白三色之光沌沌如月之暉真陽元老玄一君形長五千萬丈夏三月頭建寶晨通精玉冠衣九色雲文錦袍佩太上命神之章龍景丹文常立紫雲之上坐則七色蓮華光明焕爛秋三月則變形為嬰兒坐紫虛之中頭戴五色華蓋手把五芝華幡冬三月則變形為月光青色鬱鬱在紫雲之中青華之上光明流照洞映上清春三月則變形為青緑玄三色之光混沌相纏如雲之交鬱勃上清之中太微天帝君形長三千萬丈秋三月頭建九元飛纓冠衣七色鳳雲之袍帶夜光寶章交靈素綬常立五色師子上身生三十二色寶光在上清之上冬三月則變形為無量真仙身負金光照明十方立九色之華上手執金鈴春三月則化形為日光紫芒焕爛在玉虛之上照明十方夏三月則變形為白蒼緑三色之光更相纏繞如雲之沓青靈陽安君形長五千萬丈冬三月頭建三精芙蓉晨冠衣雲文丹錦飛裘足履九色師子佩流金火鈴交帶七元身生七變之光煒曄玉清之上春三月則變形為老公頭戴飛龍口銜月身衣羽衣手持紫綬在丹霞之上照明玉清夏三月則變形為虎頭人身五色斑斕光照十方秋三月則變形為黃緑紫三色之光混沌上清如日之暈上元太素三元君形長三千萬丈春三月頭建寶玄扶晨羽冠服紫氣浮雲錦帔九色龍錦羽裙腰帶流金火鈴虎符龍書坐於太虛之中膝下常有丹緑青三色之雲光明煒曄照玄十方夏三月則變形為一軀三頭戴七稱寶冠身服三素飛雲錦衣立九色鳳凰之上照明十方秋三月則變形為七曜華精玉光煒曄紫雲之上光色鬱鬱如日之暉冬三月則變身為青紫白三色之光蓊蓊勃勃如金之精高上太素君形長三千萬丈夏三月頭建紫元寶冠衣丹錦七色之襡佩豁落七曜元章帶三寶招仙之策常立五色蓮華上光明焕照秋三月變形為龍頭人身五色斑斕光明流曜映照十方冬三月則變形為三目之神光色沌沌照明上清春三月則變形為蒼白二色之光奕奕在元氣之中紫霄之上上清紫精三素君形長七千萬丈秋三月頭建通精晨冠衣五色斑文虎衣佩交靈素綬帶招仙之劎常立九色師子之上項生圓光照明上清冬三月變形為鳳頭人身衣蒼碧紫三色羽衣光明流焕上清之中春三月則變形為人頭龍身文彩焕曜照明上清夏三月則變形為黑黃二色之光混沌相纏如雲之升皇清洞真君形長五千萬丈冬三月頭建三梁玉晨之冠衣七色虎文之裘帶流金火鈴七色杖幡常立三素飛雲之上光明煒燁玉虛之內春三月則變形頭建黃巾衣三十二條法衣手執華幡在紫雲之上夏三月則變形冥目內視頭戴華蓋足立蓮華秋三月則變形為黃白二色之光明流焕曜在太空之中照明十天皇上四老道君形長七千萬丈春三月頭建元真七寶玉冠衣鳳文斑裘佩豁落流鈴帶招真之策常立九色師子十二華光在上清之上夏三月則變形為小兒衣五綵之衣口銜七星立白雲之上秋三月則變形為人頭蛇身五色斑斕在玉虛之上冬三月則變形為青赤白三色之雲更相纏繞在玄虛之中玉晨太上大道君形長九千萬丈秋三月頭建百變神光玉冠披飛森霜珠之袍七色虎衣佩九色離羅之章帶晨光月明之鈴常坐七色之雲光明流曜上清之中冬三月則變形頭戴七光圓輪身著三十二色法衣足立九色師子之上光明煒燁在上清之上太微之中春三月則變形為老子頭建角巾身著虎文之衣手執金符在五芝華上夏三月變形為紫黃二色光明奕奕更相纏繞在紫虛之中中央黃老君形長三千萬丈夏三月頭建寶琅晨冠衣九色雲文裘帶交靈紫綬十二華光常立五色師子之上光明流曜上清之中秋三月則變形為玉童頭戴七精之華冠衣飛天羽衣手執華幡冬三月則變形為真仙通身黃金之色衣七色衣項負圓輪足履蓮華之上光明流焕春三月則變形為紫緑青三色之光更相纏繞在玉虛之上太極大道無景君形長三千萬丈秋三月頭建晨纓寶冠衣無縫九色章衣佩神虎上符帶寶仙之劎項負流金之光照明七十四方常立玄龜之上冬三月則變形為虎頭龍身五色文綵明徹上清春三月則變形為老子散髮至腰衣飛青羽衣立紫雲之上夏三月則變形為赤青二色之光更相纏繞在紫虛之上太清大道君形長九千萬丈冬三月頭建九元通天之冠衣九色龍衣佩三氣中章帶交靈素綬足立三素之雲光明焕曜在上清之上春三月則變形為三頭之鳳口銜素綬一身有九色之羽文彩焕爛洞映上清夏三月則變形為三色之圓光色赤純純如車之輪光明洞曜在太清之上秋三月則變形為紫白黃三色之光光明焕爛洞照上清皇初紫元君形長九千萬丈春三月頭建紫元寶琅神冠衣三色虎文之裘佩素靈之綬足立三素之雲光明映照洞觀十方在上清之上八微之內夏三月則變形為真仙通身金色項負圓輪文彩焕爛光明奕奕照映十方秋三月則變形為三色童子衣五彩之衣手把華幡奕奕焕爛照明上清冬三月則變形為蒼碧紫三色之光光明焕照映朗上清無英中真上老君形長七千萬丈夏三月頭建通天寶冠衣七色斑文之衣佩靈飛紫綬帶通真之劎立九色師子之上光明洞照焕赫上清秋三月則變身為老公頭戴黃巾衣黃緇之袍手把金杖立蓮花之上光明照映十方冬三月則變形為三日之光光明奕奕照映十天三氣混合如雞子之黃春三月則變身為紫蒼白三色之光光明焕照映徹九天九真中經云中央黃老君者太上太微天帝君之弟子也以清虛上皇二年混爾始生日暉重曜連光映靈五雲翳蓋慶煙玄停年七歲焉仍自長生之要天仙之法乃眇綸上思欽納玄真蕭條靈想心栖神源廣體八絶握空投金解脫於文蔚之羅披素於空任之肆目豁玄元之户手披萬寢之庭爾乃天韵妙藹宿會玄感於是太上以帝君九真之經八道祕言之章施修道成受書為太極真人紫書金根經云青要帝君者九陽元皇玉帝弟子以中皇元年歲在東維天始告暉君育於玄丘玉國無崖之天瓊琳七寶之下溟濛九域之濱法化應圖三旦啓晨仍有九龍翼君側七色瓊鳳蔭君身神麟合芝以玄明天女吐精以灌真玉童擲華以却穢神妃散香以攘塵含漱胎息法秀自然年冠二六面發金容體生靈符言韵金章七十二色洞映玉形三晨纏絡六氣齊軿玄靈紫蓋生乎房飛精流光照其庭含真獨秀熙頤靈嵎容序順化隨運沉浮栖心明霞之境遨浪玉國之墟執抗元皇之策落景九域之丘逍遙流眄遂經纍劫方還清齊雲房之間以紫雲為屋青霞為城黃金為殿白玉為牀五氣交結臺高連層玉陛文階鳳闕四張金童侍側玉華執巾天仙羅衛五千餘人備天之獸羽騎如鱗龍虎辟邪偶偶雙蹲玄氣九會靈風揚煙芳香激無虛生瓊宫流精玉光洞映八天青要是紫清帝君之别號受元皇玉帝紫書妙訣皆衆經之要祕九天之上書八會之隱文也玉帝命高上直真總仙君斷集寶目合為衆經以紫筆繕文金簡為篇皆出上皇玄古之道高聖所撰集以成卷傳於青要帝君紫度炎光經云太微天帝君生乎始青之端元曜靈之胤玄氣未凝之始結流芳之胄法形焉連光映靈紫雲曜電玄煙掩藹丹暉纏絡妙覺潜啓仍採納上契條暢純和吐納冥津遂降虛生之胎哺兼洪泉曲芝結形之始仍學招真之道遐思遠覽潜想內瞻坐觀無崖洞存幽虛年始三歲焉中方審正真神披朗逆知未然究覽極天之境無幽不鑑無上不覩無下不窺也年行二七金容內發玉華外映洞慧神聰朗覩虛玄偏堂帝號其任乎澄流九霄之霞飛眺洞清之源明機覽於極玄領綜運乎億津積感加于冥會妙感發於自然遂受太帝之號積感所降豈生便任乎三華寶曜內員上經云南極總司定録上真禁君以始皇元年歲在壬午七月七日中時於上上禪善無量壽天玉國七寶洞虛鳳京紫臺瓊琳之下稽首玉軒請問玉帝虛皇天尊天胤皇基名題帝篇位登上司總監萬仙而未獲啓授度命之方願賜寶訣以度後賢於是虛皇道君告南極總司上真禁君曰金房度命回年之訣祕在九天之上大有之宫金臺玉室九曲之房此道玄微非中真所參得行此法與九氣同根齊光三景天地長存修之萬遍位加仙卿乘煙駕虛上造帝皇今以相告順而行焉高上元始玉皇譜録經具出八百道君名諱今所不録也大神太上太真科經云太空太虛太元無始無初有一大神體無而有有智有靈靈智慧解洞照群生群生有感太神降應應為感主號曰太神老君經誡云神人者體道洞靈變化應因無形而形乍亡乍存散則為氣聚即為人往來無門出入無間升天降地經營六合之中有道之所則為人徵不行自至不呼而應施玄功隂澤深化隂名不可名故謂神人太上靈寶無量度人上品妙經云中有度人不死之神中有度世司馬大神中有南上度厄尊神長生度世無量大神飛天明真科經云天尊於是命召十方飛天神人披長夜之府九幽玉匱出明真科律以度童子太上靈寶無量度人上品妙經云今日校録諸天臨軒今釋今日者總指三元八節齊直之晨則十方飛天一切大聖同會玉京校定録籍天尊爾日大慶臨軒東方無極飛天神王長生大聖無量度人南方無極飛天神王長生大聖無量度人西方無極飛天神王長生大聖無量度人北方無極飛天神王長生大聖無量度人東北無極飛天神王長生大聖無量度人東南無極飛天神王長生大聖無量度人西南無極飛天神王長生大聖無量度人西北無極飛天神王長生大聖無量度人上方無極飛天神王長生大聖無量度人下方無極飛天神王長生大聖無量度人十方至真飛天神王長生度世無量大神並乘飛雲丹輿緑輦億乘萬騎浮空而來童子靈寶五鍊生尸經云天尊時於長樂舍香林園中教化七千二百四十童子法事粗悉上智童子上白天尊今既開宥一切普新皇道既暢澤被十方伏願天尊既垂大慈願卒皇恩於是天尊普命諸天上帝今當更為上智童子開諸法門紫度炎光經云東方青光童子名青上玉字飛正身作碧霞之色流光焕照南方赤光童子名丹暉字玄紀身作赤霞之色流光鏡於南方西方白光童子名浩華字回神子身作素霞之色流光焕照北方黑光童子名玄明上字太隂文身作皂霞之色流光洞照焕於北方中央黃光童子名執忠字黃録子身作黃霞之色如黃金之精流光焕爛太上智慧經贊曰金華擎洞經捧香悉仙童嘯歌徹玄都鳴玉叩瑶鍾升玄經云金光童子現人才服飾品板目上清三天君列紀經云少野童子現地才山品上目也大洞真經云始元童子現地山品洞目大士升玄經云太上曰道陵汝可與此大士共相勞問是大士者名曰善勝此大士久修淨行功業成就與汝無異太上太真科經云小乘與學險魔惱破之被不度長屬六天是以大士發心上乘功高德重魔不能壞雖來干觸皆即歸降歸降受事轉身為真不能頓轉猶為魔群保舉學士輔護升玄也太上太霄琅書經云大士大乘濟度無量研尋至道洞智慧源始終無違身足救物剋得神仙與寶合矣道典論卷之一
