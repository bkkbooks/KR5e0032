front:
  text: 道典論卷之三姑三
  hash: sha256:e302e72a01f94f7ae7a0b6e1644bbd495da24c157dcee0e200ebe9992211dcf2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0032_SJB_003-240845c, image: sjb/24/240845c.png}
body:
  text: 誹謗上清隱書龍文經云人多僞薄不明至理罪障根深疑惑真正儻聞微妙更生毁謗輕慢不信致墮惡道風刀苦毒歷劫不免昇玄經云太上曰若有誹謗此經者死入地獄受考三官見世癩病又云竇子明曰世人迷惑貪求自恣不識至真諂僞疾佞或妒賢嫉能更相謗毁或諍色欲隂相咒害或恃强勢凌易孤弱或自是非彼或作小善旬月之間不能至誠便求見效未應之須便忽宿命之言無報應喻如田家種穀春種秋望乃得其實種而待炊不解餓死修福行善亦復如是福積成慶禍積成殃皎如日光而人不信可不哀哉毀辱明真科經云無極世界男女之人生世立行評論道德毁辱天真不信經法口是心非潜行謀惡其罪深重死受苦毒縱還人中當生邊夷非人之類百惡所歸以報宿對永去人道無有歸期流連罪門生死莫知攻擊明真科經云無極世界男女之人生世所行評詳四輩攻擊天人死受酷對長淪惡根昇玄經云道言人生受筭不信經教砦毁神真决駭縱心殺罰非度駡詈天地攻擊真人爲玄司衆鬼所奏聞徹太空吾當下司命付酆都滅其定筭修短之次行之不改斷種滅嗣蒸嘗絶矣法輪經云道言吾嘗歷觀諸天見有百姓子男女之人攻根伐主謗擊賢人諂害忠良滅人之命死魂彌訴斯罪深重致招今對諸苦備經萬劫當還生邊夷之國有人之形無人之情耽酒太上說智慧消魔經云太上曰酒爲水穀之精善能宣通氣液節之接靈益性縱之乖神損生耽湎致死非智慧也盟威經云太上曰高才英秀唯酒是情麴糵薰心性情顛倒破壞十善興隆十惡四達既荒六通亦塞急宜除之老君威儀令經云君子飲酒以欣慶小人飲酒以興爭有二十四事各明依按善共奉行違令一事非子弟也一飲酒醉時則臣不敬君君或驕暴妻不承夫子不孝父二醉便亡失道德調戲無度三醉隨口而言言語輕慢不顧尊卑四醉便坐不自安頗我低昂五醉卧便利嘔吐爛漫六醉便迷荒無所畏忌意欲擊虎或投水入火七醉道說人隂私之事八醉便輕口泄言言無所畏九醉卧時狀如死人了無所知十醉時來歸家室大小見之逆走甚見虎賊十一醉或致疾病面色痿黄十二醉便獨卧道中所持物皆棄失之十三醉貪酒以取家財物以用飲酒坐之貧困十四醉便駡天神脫衣狂走逢人共鬭十五醉便輕盜取不避親疏十六醉便不以惡爲惡不以善爲善十七醉便破壞家中什物十八醉不憂家事不念妻子十九醉便王事不修坐之逸退二十醉便坐之致灾或爲軍將坐酒破軍軍事不速二十一醉便墮馬顛倒遂仆傷於面目二十二醉便恍惚事業廢置田蠶不登二十三醉久則糜腸爛胃損失身命二十四醉傷神亂氣損德敗真可不愼之明真科曰無極世界男女之人生世立行耽酒好色恍惚失性猖狂迷惑五情亂離去神損氣因醉會欲爲惡不覺叫唤駡詈獨作無對打擊善人穢慢道法謗毁經教背真入僞違負口信欺誘四輩所行失道罪有深逆死受重對魂魄苦劇摙汲溟波以灌四瀆讁役江河晝夜無息銀鐺杻械相牽流曳㝠㝠長夜終無解脫萬劫當生賤人之中貧窮陋疾人之所惡以報宿怨因縁之對福路日遠罪根日結不得開度無由得出飛天人說頌曰好酒失本行五神并猖狂死汲溟波水灌沃四瀆中放蕩太上處胎業報經云或復有人浮好三寳信心不專恣情放蕩流滯愛欲假托經文以要名利因以聚衆混雜爲非如是之人見嬰重考死三惡中終天無解靈寳大誡經云天尊言愼多色視放蕩目神每自制銜愛固目瞳思真靜念令通智慧洞觀虚空不慈明真科經云無極世界男女之人生世所行不慈不仁烹殺六畜割剔殘傷夭殺獸命屠毒衆生其罪深逆死受酷對吞火食炭爲火所燒頭面焦燎舉體爛壞無復人形身負鐵杖頭戴火山痛非可忍考不可擔不得開度何由得還飛天人偈頌曰不念懷慈心酷毒害衆生死魂負鐵杖萬劫戴火山不孝明真科經云無極世界男女之人生世不孝駡辱父母六親相殘其罪深逆死受酷對萬劫當得生六畜之中任人殺活以酬昔冤永失人道長淪惡根三障元始智慧正觀解脫經云道君當知因三毒故生三障法一者煩惱二者諸業三者果報以三障故就令學者不得正修真實之觀言煩惱者即是愛見常在於心故正解不生勞役行著名煩惱障言業障者以有欲心行善惡行威極重業定得世間苦樂之果不得修習離世間行隔正智故名爲業障言報障者生在三惡苦惱切身無因得修戒慧之行人天著樂不悟無常愛欲自覆日夜無舍貧窮戹疾衆縁不具皆不得修出世正道名爲報障有智之人覺知是已善行方便轉此障法三畏昇玄經云太上曰道陵知末世人民有三可畏宜善詳焉一者道義嫉妒可畏二者誹謗可畏三者貪欲可畏道義嫉妒則經法不行誹謗法師則使百姓信道不濃貪欲財色則人所弃薄此三者二在外一在内除此三患乃可傳道當勸奉學太上於是仍作歌曰嫉妒惡勝已誹謗於賢明貪欲嗜財色不得傳吾經三患既未除何期在幽㝠僞行要利養常無有至誠見人崇有德心執害意生是人鬼所疾見世貽惡名死則歸幽都考對入鬼囹轉輪輪億萬劫受罪無數形三毒元始智慧正觀解脫經云太上道君上白天尊云何名爲煩惱之相天尊曰言煩惱者緫名三毒謂貪瞋癡能害衆生法身命故名之爲毒所言貪者引取無厭染欲愛著聯綿無己於世間法及出世法有求樂意皆名爲貪所言瞋者於衆生中及非衆生貪懷懟恨咆勃忿怒如火熾盛燒滅善根結太怨憾是名爲瞋所言癡者不信不知三寳正法驕慢諂曲無所了知觸壁無底不從訶諫好說無益多行惡事所作失道故名愚癡四病昇玄經云太上曰道陵當知世人復有四不善法最爲難除道之至病當令知之何者爲四一者世俗之人不師有道又耻下問二者爲道日久知見淺薄見有勝己耻不更學三者自言大學不聽异經四者輕慢后學言無所知如此四種之人縱使學道徒自勞耳不能得道有所通達同無神驗何以徒勞如此之人求道之初本無至心欲求名譽要羅供養如此之人恒爲食吞火毒取人財物以爲衣服猶如劎戟在其身體貪目前之利不知后世殃考深重死入地獄燒鐵洋銅以灌口中以鐵勒針作衣服之形被其身體拷掠捶撻晝夜不息億兆載劫方出爲人常處下賤爲人奴婢兵卒厮伍賢聖教化講經不得預聞或心欲更學不得自在吾今目前便見此輩不可稱計甚可哀傷明教將來愼之愼之五欲老君經教云貪欲無數無數之欲念念叢生不可勝言大略有五一目欲觀五色色過則魂勞二耳欲聞五音音繁則魄苦三鼻欲嗅五香香溢則精流四口欲甘五味味豐則神濁五身欲恣五體體慢則志散志散則脾傷而行危神濁則心亂而口爽精流則腎虚而迷狂魄苦則肺損而耳聾魂勞則肝困而目盲五者混闇則身滅命亡五者淨明體全年永五濁今釋一者命濁三者見濁三者惱濁四者生濁五者時濁也靈寳玉訣經云太上道君告精進學士王龍賜曰吾受元始真人舊經說今釋古引古證今深可信也經道萬劫當還無上宛黎天過世世後五濁之中今釋此標五濁之時處也遭命不幸今釋此命濁也非唯年筭夭促義兼往業不淳也是男是女不見經教恒處惡道今釋此見濁也邪見覆心不信正理謗法罪重久在地獄生壽無幾而憂惱自嬰多受枉横今釋此惱濁也貪瞋癡或能生憂畏經累行人也自生自死輪轉五道墮於三塗八難之中今釋此生濁也任命起滅輪轉苦難障隔正道殃對相牽無有極已生死分離無有豪賤今釋此時濁也大劫垂周惡果皆熟普遭凶害實爲痛心今解說諸惡以度可度汝好正意諦受吾言於是注訣龍賜稽首伏受教㫖今釋太上哀傳付經訣使五濁障消保今太平之運明真科經云來世之人不見科誡方當履何五濁毒湯遭難遇害不能度身靈書度命經云元始天尊曰吾過去後真文隱藏運度當促五濁躁競萬惡並至何感念來生在其中甘心履罪展轉五道長苦八難更相殘害憂惱切身不見經法不遭聖文任命生死甚可哀傷七傷迴天九霄經云高聖帝君曰凡學士玄記有名身有仙相則應自然合真而有七敗之傷第一之傷帶真行僞淫色喪神魂液泄漏精光枯竭氣散魄零骨空形殘神泣窮府上聞天關真仙遠逝魔魅來干自與九獄結因六天相親淪苦無極豈復得仙二傷外形存道皮好念真心抱隂賊凶惡内臻願人否敗嫉能妒賢口美心逆面歡内瞋諍論得失妄造罪原毁謗同學攻伐師根三官所記標爲惡門仙真高逝邪魔攻身走作形影飛體散神故令枉横極其惡源考滿形灰沉滅九泉徒有玄名豈保自然三傷飲酒洞醉損氣喪靈五府攻潰萬神振驚魂魄飛散内外朽零本室空素赤子悲鳴真仙高逝邪魔入形如此之學徒損精誠雖有玄記空失玉名神昇上宫身灰幽㝠恍惚求年焉得久停四傷行不弘物責人宗仰心忿口諍駡詈無常瞋喜失節意性乖恒氣激神散内真飛揚魄離魂逝九孔塵埃五府奔喪皆由性之不純行之不詳真仙高逝外痾入形如此之學將何可望雖有玄圖不免斯殃望仙日悠地里日長五傷或玄圖表見得受寳經或運遇靈師啓授神文而不依科盟漏泄天真未經九年投刺名山使青宫有録金闕結篇便傳於人流散世間輕真泄寳考結己身徒有玄名反累七玄仙道高逝身死幽泉長充鬼責萬劫不原六傷身履殗穢形影不香内無清虚外無蘭芳濁暗失真神不居房氣擾精混靈元失光五神飛散赤子騫揚邪魔來攻内外交喪如此之學望成反傷真仙高逝空影獨行淪於混濁仙乎可望七傷啖食六畜之肉殺害膩口之美臭氣充於藏府伐生形於非己真氣擾於靈關游神駭於赤子魂魄逝於宫宅濁啼纏於口齒仙真高登於玉清己身沉頓於地里徒有玄名帝簡亦不免於必死八難靈寳真一自然經訣云道言王侯道士民人得生爲人舍女作男難也既得爲男才智明遠六情完具形容端偉聲有玉音氣若名香眼有日光衆觀欣悅玄如不足難也諸善已備得生有道之國君父賢明篤尚道德難也貧窮而好道念施惠不懈難也富貴而信尚道士尊奉經書不殆難也能受人之惡而不與較制身命使不死壞得度世仙道難也得見洞真洞玄洞神太上三洞寳經宗奉諷讀供養燒香難也值見仙聖真人說法教化之時同志相遇難也是爲八難矣衆真誡經云西城王君告曰夫人離三惡道得爲人難也本經注云三惡道者不得作人得作鳥獸蟲畜之類謂之三惡道也既得爲人去女爲男難也既得爲男六情四體完具難也六情既具得生中國難也處中國值有道父母國君難也既得值有道之君生學道有慈仁善心難也善心既發信道德長生難也既信道德生太平之運爲難也可不朂哉七患本願大誡經云真人曰患人得生人道也而不修德養性以全於命矣患聞經也而不信矣患受經也而不講誦矣而不修其事矣患不修身矣患服藥也而未應中怠矣患道行不備也誇求昇騰矣患靜齋讀經矣處幽山而不堪其憂矣此七患在人之身也若不戒之身無濟理所以云大患者及我身斯之謂矣可不思歟可不思歟五敗靈書紫文經云第一敗人淫則鬼液外漏精光枯竭魂魄焦散骨薄髓穢魂號靈府上聞玉闕三宫讙爭胎英悲錯此一敗仙相也二敗勿食六畜肉則形氣鬱臭神靈濁滯面黄齒枯脾育死氣魂不受真魄生邪悖身沉長淵骨骸土没此二敗仙相也三敗勿食五辛之菜則五藏惡臭三華潰亂神不上達精胎下淪魂魄生離赤子煩頓飛靈失守明光流遁此三敗仙相也四敗勿殺生昆蟲以上則冤對萬物束骸流血形暴魄亡魂氣交戰胎靈傍徨嬰兒逃散泥丸姦狂赤子棄叛尸形湯爐水煑糜爛此四敗仙相也五敗勿北向便仰視三光勿北向理髮解脫衣裳勿北向唾駡犯破毁王破謂歲下辰太上太真科經云太上道君曰魔王邪神皆被廢黜雖得重行悉名故氣田獵老君道德經云馳騁田獵令人心發狂明真科經云無極世界男女之人生世無道不念善縁三春游獵走犬放鷹張羅布網放火燒山刺射野獸殺害衆生其罪酷逆死充重殃身負鐵杖萬痛交行驅馳百極食息無寧死魂苦毒非可堪當萬劫當生野獸之身恒被燒斫以報宿冤縱還人道恒遭惡人身受鞭撲憂惱自嬰福路目遠纏結日臻不得開度長夜綿綿昇玄經云道陵偈頌曰不念作慈心游獵殺衆生罪竟受對報炎火燒其形漁捕元始智慧正觀解脫經云天尊曰或有受生漁捕爲業壅川决瀆布網垂綸種種方便傷害水族煑炙屠膾趣飽其軀或行衒賣以求財賄如是之人死入地獄隨相以報受於爐鑊刀山劎樹一切苦對還爲畜類以酬宿冤若得爲人壽命短促常多患惱自作教人及以錢買生歡喜心同名爲殺其罪無二苦酷明真科經云無極世界男女之人生世身行發心舉意恒惡爲先苦酷無度讒害忠良死受惡對牛頭獸身晝夜考掠楚毒難言身體爛壞無復人形萬劫當生邊夷之國有人之形無人之情永失人道長淪罪門流曳五苦八難之中不得開度億劫無還飛天人偈頌曰苦酷諂忠良讒謗擊賢人生世處邊夷死受牛獸身淫祀正一真人演千明科經云祭非其鬼名爲淫祀陷墜群邪太上太真科經云太上道君曰魔王邪醜皆被廢黜雖得重行悉名故氣故氣爲灾妨害億兆億兆不悟與之爲群殺生鼓舞祠祀歌吟更相恐悚貪嗜血腥贜貨狼籍罪積日深明真科經云無極世界男女之人生世惡逆殺生淫祀禱祠邪神歌舞妖孽自稱姑郎食啖百姓興造無端贜滿罪定死受惡對魂魄囚徒流曳三官五嶽之中一日三掠痛毒難言萬劫當還生賤人中或嬰六極無人之形幽淪罪源長夜㝠㝠不得開度福道無縁飛天人偈頌曰咒詛無辜人淫祀舞邪神流曳三徒中萬劫生賤身謀逆明真科經云無極世界男女之人生世所行手殺君父謀反師主毁滅經教穢辱天真死受惡對身入鑊湯五體煑漬無復人形百毒之汁以灌其身痛不可居苦難可任萬劫當生六畜之中或爲賤人聾盲六疾非人之形任人殺活以報宿怨福路轉遠罪根日深不得開度長淪無還飛天人偈頌曰謀逆害君父穢辱毁天真死入鑊湯煑苦痛不得還承負太平經云凡人所以有過責者皆由不能善自養悉失其綱紀故有承負之責也比若父母失道德有過於鄰里后生其子孫爲鄰里所害是即明承負之責也今先王爲治不得天地心非一人失亂天文也天大怒不悅喜故病灾萬端後在位者復承負之是故古者大聖皆知自養之道故得治意少承負之失也其后世學人之師皆多匿真道之文以浮華傳學違失天道令後世浮淺不能善自養愛爲此積久因離道遠謂天下無自全之術故生承負之灾夫南山有大木枝縱覆地數百步其本莖也上有無貲枝葉華實其根不堅爲大風所傷其上枝葉華實悉傷死亡此即萬物草木承負大過也其過在本不在於末而反罪未曾不冤結邪今無過被灾承負之責矣寧可罪後生邪時來承負之責如此天夫人生盡樂好善而巨壯而固反不肖且惡豈有解邪此盡承負之大效也反以責時人故不能平其治也時人傳受邪僞已久安能自改正乎哉天憐之故上皇道應元氣而不也道典論卷之三
