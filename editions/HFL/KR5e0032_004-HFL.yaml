front:
  text: 道典論卷之四姑四
  hash: sha256:80fe95f64a2be75b544d7ad9a2e7f7c6ddaf19f5be542a2114a67bfe55fad504
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0032_HFL_004-001a, image: hfl/0764/0764-090.png}
body:
  text: 妙瑞靈寳真一自然經訣云正一真人曰人奉經慕道亦有真應或聞香烟芳徹或聞琴瑟之音或聞空中雅咏誦經或見圓光如日及真人十方天尊飛仙真人能有斯之异精進不怠庶必得仙道太平經云人君爲善於内風雨及時於外故瑞應反從人胷中來故有可欲爲皆見瑞應何有不來者乎夫至誠乃感皇天隂陽爲之移動誰往爲動者乎身形不能往動也動也者㝠乃心中至誠感天也又云瑞者清也靜也端也正也專也一也心與天地同不犯時令也夫天地之性自古到今善者致善惡者致惡正者致正邪者致邪自然之術無可怪也故人之心端正清靜至誠感天無有惡意瑞應善物皆爲其出古者聖賢用心清淨專一故能致瑞應也諸天内音經大聖衆真頌曰妙會自然感靈瑞發空洞世爛啓幽期障蔽日月光玄隂不解夜四衆并恭恭靈運自應圖倏欻朗太空災異太平經云今天地開辟以來凶炁不絶絶後復起其故何也其所從來者乃遠復遠本由先王治小小失其綱紀灾害不絶更相承負稍積爲多因生大奸爲害甚深動爲變怪前後相續而生不祥以害萬國其所從來獨又遠矣君王不知遂相承負不能禁止令人冤呼嗟動天使正道失其路王治爲其傷常少善應人意不純轉難教化邪氣爲其動帝王雖愁心欲止之若渴而不能如之何君五雖有萬人之仁德猶不能止此先王流灾也故反以爲行善無益天道無知也禁民爲惡愁其難化反相尅賊急其誅罰一人有過乃及鄰里重被冤結積多惡氣日以增倍以爲道德與經無益廢之而不行各試其才趣利射禄鬭命中者爲右是爲亂天儀無法之治安能與皇天心合乎天甚病之久矣隂陽爲其失節其明證也治得天心然后邪可去治易乎故今教以上皇興平第一之道得而急行惡可消滅天之佑善者明矣先王灾雖流積一旦除滅易耳今帝王乃居百重之内用道德仁義乃萬里百姓皆蒙其恩父爲其慈子爲其孝家足人給不爲邪惡怪祅太平經云天道乃祐易教祐至誠祐謹順祐易曉祐易勑將與人君厚故教之不與其厚者不肯教之也猶若世人相與親厚則教示以事不相與至厚不肯教示之也教而不聽忿其不以時用其言故廢而置之不復重教示之於是灾怪便止不復示勑人也如是則雖賢聖聾闇無知也聦明閉塞天地神祇不肯復諫止者也古者聖賢重灾變怪因自繩正故萬不失一也夢相太霄琅書經云兆暮卧獨處當以帝章置於心今釋帝章者瓊文章符也即有太㝠真仙來衛兆形影應夢相與真共言不出九年得面對真人無上真人内傳云尹喜爲關令之時常夢見天真或曾同游四海之外心中昭然有所覺悟乃㝠契玄聖自然而同符也老君感焉後聖九玄道君列紀經云後聖君母先夢玄雲日月纏其形乃感而懷焉育之亦有群龍吐水盥器中靈寳直一自然經訣云正一真人曰夫人將當得靈寳經者必先有靈應或夢見天尊真仙或見山學道士及雲車寳蓋龍鳳或夢登山見聖人宫室及飛行虚空見七寳珍物珠玉或夢上天見天王帝主此皆宿命合道玄象告應者也雌一五老經云太素真人教始學者辟惡夢法若數遇惡夢者一曰魄妖二曰心試三曰尸賊厭消之方也夢覺以左手捻人中二七過啄齒二七而微咒曰大洞真玄强練三魂第一魂速守七魄第二魂速守泥丸第三魂受心節度速啓太素三元君向遇不祥之夢是七魄游尸來協萬邪之源急告桃康護命上告帝君五老九真皆守體門黄闕神師紫户將軍鉞摇鈴消滅惡津反凶成吉生死無縁畢若又卧必獲善應而向造爲惡夢之炁則受閉於三關之下三年之後唯神感㫖應乃有夢也皆知見將來之明無復占不祥之想也若夜卧遇善夢者吉應好夢而心中自以爲佳則吉感也卧覺當摩目二七叩齒二七而微咒曰太上高精三帝丹靈絳宫明徹吉感告情三元柔魄天皇受經所向諧合飛仙上清常與玉真俱會紫庭畢此大洞秘訣以傳於始涉津流者矣吉兆太平經云旦夕學以大吉之道纔得中吉耳學以中吉纔得小吉耳學以小吉此已入凶道矣又云王者深得天意至道住祐之但有百吉無有一凶事也凶徵太平經云夫惡乃死凶之處故凡人不力學吉輒且入凶夫凶廼天下惡名稱夫凶者乃天地人萬物所疾惡不可久存是大患之本禍之門户服餌太上太真科經云服餌將藥不須厚饌太上太霄琅書經云除欲滅私服御吐納赤精五牙金丹玄素衆術億千輔佐成功隨縁施用不可偏滯諸術而功行無涓空望長生萬無一果良由世人學法多執偏術見其序說便謂爲竒修之無驗又云虚妄術本輔功功在遣欲欲不能遣因術迷經經出世者餐霞餌氣毁易身形雲人羽客神靈同游五符經云真人告禹曰汝功德感靈天人并助而年命向凋嶮矣哉乃口訣以長生之道示以真寳服御之方八坦四門高上經云靈關統三元精變結五神九煉瓊胎府化生表自然離合潜相推凝氣以成仙服御填九靈靜念降玉軒明真科經云生而煉真服御神丹五石鎮生神寳五官功微德狹運未升天身受滅度而骸骨芳盈億劫不休須神及形便更受氣還生人中智慧聦達逆知吉凶通靈徹視役使鬼神輪轉不絶克得受書爲九宫真人偈曰苦行修生道服藥練芝英滅度形不休體骨自芳馨導引二十四生圖經云鬱鬱五雲芝玄暉吐玉光凝津洞靈府徘徊日月宫五色理高真流精灌十方呼吸不覺疲飛天并金容導引餐靈氣玄哺六胃充精思易致感安坐覩空洞老君觀身經云老君曰自非聖明誰能頤神養性行生導氣以度難也若能行生導氣載神離苦修生行氣以度厄世斯乃上聖真人達見識微知機者也夫爲道者當行生導炁以載其身者也老君妙真經云道曰夫人爲道道身五藏者皆思氣之盛壯微妙從虚無來故實者不如虚也有者不如無也疾者不如遲也太一帝君天魂内變經云若能常行九晨照洞房泥丸之法者既以檢魂魄制萬邪清淨行之以致仙靈之氣降於寢房此所謂引三光九星以照百神者也胎息太上說玉京山經云沖虚太和氣吐納流霞津胎息靜百關寥寥究三便今釋按服氣法云息以鼻而無以口使氣常儲名之胎息又能不以鼻氣所謂大胎息者如兒胎在腹中氣息而不須外徹也能爾亦可久居水中而不短氣久久便能輕舉矣上清三天君列紀經云胎閉靜息内保百神開洞靈房堅守三真吞景咽液飲食自然身必不死可得陸仙矣太平經云請問胎中之子不食而氣者何也天道廼有自然之氣廼有消息之氣凡在胞中且而得氣者是天道自然之氣也及其已生嘘吸隂陽而氣者是消息之氣也人而守道力學反自然之氣者生也守消息之氣者死矣故夫得真道者乃能内氣外不氣也以是内氣養其性然後能反嬰兒復其命也故當習内氣以内養其形體又云古者上真覩天神食氣象之爲行乃學食氣真神來助其爲治乃游居真人腹中也古者真仙之身名爲真人室宅耳太上真人秘要經云天氣者神明之器清濁之宗處玄則天清在人則身存夫生死虧盈蓋順乎攝御之間也大洞玉經注訣云食玄根之氣使人體中清朗神明八聦身有日映面有玉澤眼生明光齒含紫氣堅腸華藏長生久視服吸朝液懸糧絶粒道要於金醴事妙於玉水所謂吐納自然之太和御九精之靈氣者也夫道之納用貴自然也德之爲靜尊恬愉也攝自然以裁真抱恬寞以正邪者則横犯不生飛害自滅可要道之㫖者也五符經云食氣萬歲當有少容雲牙今釋雲者五方雲氣也明此五氣柔軟喻如百草萌牙故言雲牙學人因此雲牙填固藏府其方繁碎不可具書事見本經鈔如後靈寳玉訣經云元始五氣常以鷄鳴上會靈寳玉山玄都上宫陽光初明散元始之暉流灌諸天其氣運轉如車之輪上御九天之關中固五帝靈山下注學士五牙之根上宫衆聖大智真人皆以其時食其暉仰咽其精與天相承致得無窮道言導引餐牙之法常以八節之日各依其方入室存思五老形像咒說畢各隨方導引服諸天氣行之八年仙官到房玉女侍衛身生光明照映十方出入游行五帝稽首三界司迎二十四生圖經云上有不死氣殖牙練五仙玉芝玄中澳體潔自生薰精思高靈降交游上帝君服黃氣太清元君中經云神仙圖曰上聖食黄賢者食元食黄之道上念中極乃脾上黄人形長三寸兩手中亦各有一黄人黄氣上升即見其神徐言咒曰黄常子黄常子黄庭真人在於已爲某取五色丹芝草諸可飲食者急咽之三五而止即飽矣肥澤延年老君觀夫太清中經云神仙經曰常念脾中黄氣上升至口中咽之三五而止則飽矣可以辟穀坐在立亡師曰常思脾中有大日日中有黄金匱匱中有書封之以黄金之印印廣縱三寸字曰威嬉精而思之窮則目出兆能見而讀之心開目明則得神仙矣常念胃中黄田中正白如凝脂中有黄氣填滿上至口中咽之即飽矣師曰胃黄田者太倉也諸神皆來就太倉中食飲中有黄金竈釜甑玉女玉童主使令故呼之曰黄常子是也致行厨矣服王氣老君胎中經云自然絶穀之道長生延年春承牙精夏承月靈秋尊明露冬受玄精迴歲一浹三百六十四九轉移十二而訖從其方面五色有别周而復始道畢矣絶穀之法計飽飯不過十二食日減一餐訖十一日減十一餐余有一餐分半減之訖十八日盡矣腸中雖空故有穀氣正坐隨王所在舒手持炁仰頭引氣仰頭咽之安徐細意導氣下入胃管腹中立鳴凡九上九下腹因大飽定心勿躁即真氣不導邪氣中入即不佳矣十二日形體輕便十八日道小成二十七日道中成三十六日道大成八十一日頭面有光百二十日其道備矣元氣大定仍是真人也太上八素真經云常當清麗燒香入室首南正卧斷隔人物杜絶他想臨目閉氣叩齒二十四通存一如法仍見離在頭上坎在臍下坤在左手中巽在右手中軋在左足下艮在右足下兊在左肋震在右肋八卦有象象中有氣氣中有神神人光明備列八方口吐生氣因滿虚空分良久雲隨王先咽次咽相生春則震王生火夏則離王生土秋則兊王生水冬則坎王生木四季乾坤艮巽王也其行者今依月迴轉巽三月坤六月乹九月艮十二月咽八氣法以鼻取之極氣則已微微咽之春寅卯之月噏震氣三取三咽止次飲離氣九取九咽止次季噏巽氣四取四咽止次噏坤氣二取二咽止次噏軋氣六取六咽止次噏艮氣八取八咽止次噏兊氣七取七咽止次噏坎氣一取一咽止都畢叩齒三十六通摩熨面耳項至四支五體周匝小極乃行之時皆當清齋三時六時禮拜啓願緩急取中適人所堪服六戊服氣法云常以朝暮先從甲子起續甲子乙丑丙寅丁卯戊辰止向辰以金梁叩玉瑛修華池續醴泉以唇檗剥丹池取靈液潄之周旋至三而一咽其五咽止更續甲戌乙亥丙子丁丑戊寅止向寅飲食如初一法下竟六甲凡三十咽咽其精華所謂飲食三五之法要也金梁者舌也玉瑛者齒也醴泉丹池靈液皆口中唾也服三光空洞靈章經云朝餐五靈氣夕噏三晨光二十四生圖經云大道妙無像運氣凝高真結空自然生震化表二神朝引五星精中噏日中津夕食黄月華寢卧練五仙變景隨空化倏欻立自然五符經云食日之精子必長生縁以上天謁元先常以月一日三日五日七日九日十五日日出時至日中食之先念心中有日日中有玄蓋蓋下有小童故赤氣遍身中身外九重思氣滿頭從頂出上升天日繞日九重咒曰日君元陽還歸絳宫與我合德俱養小童因思日精來下入頂鼻孔中咽之三九滿心中心中有三人左即太一父也右即玄光母也中央即赤子小童也坐金床玉榻執玉盤玉杯杯中玉英神酒并天芝草見在飲食之仍不饑渴而長生矣食月之精可以長生縁之以上天常以月十五日夜半時向月再拜咒曰月君子光還歸丹田與我合德俱養小童因思月光白氣黄精來下入鼻口中咽之三七而止月精托腎根長生矣食星之精上升太清常以日出晡時日中夜半上念北極太皇星咒曰皇天上帝太上道君曾孫小兆某甲好道願得長生因念星精來下在兩眉間流入鼻孔中咽之三五思氣滿心膽脾中有道母主哺養赤子即不饑長生矣丹品八素經云太上曰仙人唯知飛丹召霜煎煉雲水朱玉鮮金九爐炎霄勤苦極於營贍伺俟足於劬勞就有成者不過升身上天超躍玄洲耳此故仙人而已遠可游於九宫之間也則未有得真人之門户也四極明科經云金液丹經九鼎神圖琅玕華丹八石煉腴智慧上藥上化丹方四十六卷并仙皇之秘事藏於九疑之中五百年一傳丹名太上太真科經云仙方九品一曰太和自然龍胎之醴二曰玉胎瓊液之膏三曰飛丹紫華流精四曰朱光雲碧之腴五曰九泉虹華神丹六曰太清金液之華七曰九轉霜雪之丹八曰九鼎雲英九曰雲光水石流飛龍虎玉胎飛丹上藥也朱光九泉太清中品也九轉九鼎雲光下品也九真中經云太上八景四蕊紫漿五珠絳生神丹或名八景丹或名四蕊紫華或名太微紫玉瑛或名五珠華丹或名絳生晨華或名三華上丹或名太上飛剛或名九晨上丹凡八名也真人流珠九轉神仙九丹經云真人日服九丹令人神仙度世長生久視長服之壽萬世九丹者九道也九方也治之各自有道治九丹凡一法也第一之丹名華丹第二之丹名神符丹第三之丹名神丹第四之丹名還丹第五之丹名餌丹第六之丹名宜丹第七之丹名深丹第八之丹名伏丹第九之丹名寒丹也上清三天君列紀經云中黄八道金書紫文九轉霜雪琅玕華丹還白玉酒金液流精玉林結華日月之水皆白日飛仙登天之道也皆出白帝君所藏於瑶臺非有真録不得其法大洞玉經注訣云琅玕鬱華七陽日嬰九琳之液八瓊之精四蕊紫漿五珠絳生三華飛剛雙珠月明蘭腴金𥹋甘露玉瓶青建弱羅漂芝流靈神渠丹散玄柯連縈琅玕朝結西皇素盈可以沖躍朱霄飛虚玉清呼而吸之以至㝠靈漱而變之以入帝庭黄氣陽精三道順行經云洞陽宫内有流火庭其中有炎光八煉自然玄丹太上丹簡墨靈經云修飛仙騰超之道當授神丹三十六水金液之術太清丹經靈寳真一自然經訣云夫真舍利是金液之凝精還丹之變化太元真人茅君内傳云茅君各賜其二弟九轉還丹一劑并神方一首各拜而服之仙道成矣道典論卷之四
