front:
  text: 道典論卷之二姑二
  hash: sha256:ad535722da2a77284feeefcd037c88ea7461f58a820c7ad3334bee7f2608972f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0032_HFL_002-001a, image: hfl/0764/0764-030.png}
body:
  text: 道士太上太真科經云凡開闢之初聖真仙人皆宣道炁立法相傳同宗太上俱稱學士以道爲事故曰道事道事有功故號道士道士者以道爲事聖運昇度衆魔又興皆由人物情淺所致邪雖伐正真去邪來來同邪人不干正士正士事道學法依科魔王敬護邪精敢侵所以受道之身皆是天魔上官天魔衆神皆是道士下官昇玄經云夫唯賢者與彼俗人事事有反目不多瞻見好不驚耳不聽讒不聽亂聲鼻不受香芬芳之腥口不嘗甘茹犯衆生心不想慾財色華榮手不姦用足不惡行此是道士之行者也本願大戒經云有道之士取諸我身無求乎人道言修之身其德乃真斯之謂也洞淵經云道士貴人悉天上來生也自非先身之積善者終不得作道士矣正一真人演千明科經云清德道士已經三乘教化一切施行衆善觸事得法可進供養三洞尊經太上太霄琅書經云明解須專專必有應應則通神何勞乎感欣戚兩遺日夜專勤誓進無退號爲道人人行大道號爲道士士者何也理也事也身心順理唯道是從從道爲事故稱道士先生敷齋威儀經云真人曰學士若能棄世累有遠遊山水之志宗極法輪稱先生常坐高座讀經教化愚賢開度一切學人也若復清真至德能通玄妙義者隨行弟子同學爲稱某先生其人鉤深致遠才學玄洞志在大乘當稱玄靜先生或遊玄先生或遠遊先生或宣道先生或暢玄先生略言其比不可勝載須世有其人學者稱夫先生道士也昇玄經云仙公又向太極真人長跪言歸誠先生願降法澤滋潤枯槁使將來道士得修至真棄邪法術三元布經云太上太道君受此經於玄古先生以傳玄都仙王上清變化七十四方經云紫府先生能爲不死恬和天真洞思守神年三千歲故未昇天盤桓洞室採擇上真元始變化龜山元録經云皇上萬始先生形九千萬文冬三月頭建丹陽日精之冠衣赤雲明光錦袍佩金虎鳳文帶丹皇紫章常乘白雲坐五色師子光明流曜焕照上清春三月則變形爲人軀三頭鳳皇衣九色斑文虎衣常立十二華光之上夏三月則變形爲三日之暉紫光八芒爛映焕明在上清之上十二色蓮華之中秋三月則化形爲青赤紫三色之光更相纏繞如日之輪上清紫晨經云上皇先生紫晨君蓋二暉之胤結玉晨之精育龍烟于太空包紫虚以通靈托九玄以含秀凝洪露以成神陶三炁以自觀經玄母以法生任歷劫而受化感日吉而曜形於是上皇元年天甲啓晨誕於神州八朗之天平丘中域洞淵之濱生之且面發金容體映玉光五色紫章七十二變精䊮玉顔神龍吐芝以濯溉鸞鳳撫翼以隂玄丹霄散景於瓊軒流光焕爛於霞真二景停暉於八玄七元迴精以匡晨金仙散香以亂炁神妃擲華以發煙五緯結落神秀紫天年冠二九逍遥中元餐精咽炁吐納靈津含芝内灌凝神胎仙挹潄守默淡泊自然思微念炁時不虧閑積感洞元名超上清受號元皇位登紫晨蘭風應挺順運流遷神秉五曜形盤三元飛霄迴駕乘空落煙群仙啓路三道合明流電吐威逸駕九玄再登玉陛三謁紫庭遊眄瓊闕宴景三元携契五老玉霄上寳飛獸攘袂神鳳撫鳴巨虬匡轡靈風散香流芬激揚蓊藹玉清金童攀雲而侍輪玉女躡虚而衛靈太上丹簡墨録經云若受法位至真一及太一素券之號可署先生之位其生年屬東方宿者當署東嶽先生之號生年屬南方宿者當署南嶽先生之號生年屬西方宿者當署西嶽先生之號生年屬北方宿者當署北嶽先生之號生年屬辰戌丑未并中央七宿當署中嶽先生之號此五嶽先生皆始入地録有應署之德非有精靈感應不可空署之上人無上真人内傳云名入太上玄録爲三界魔神靈鬼咸敬之號曰天人上人道士常自謙下也得道清貴莫尚此矣皆尹先生口訣相傳而教世賢上士也衆聖難經云仙人問仙公前與上人俱入洞庭看天王别宫初登包山時見有一輩仙人求隨上人看戲盡何等仙人乃多如此答曰彼仙人皆是諸名山洞室仙人其已不多子不見崑崙蓬萊鍾山嵩高須彌靈島諸大山洞室仙人無數矣仙公請問經云魔王承奉太上衆真天尊上人太上太霄琅書經云上人妙士和光同塵挫銳解紛與俗宻異佩服録諱呼吸元精建德立功非凡所測至學太上靈寳無量度人上品妙經云至學之士誦經十過濟度垂死絶而得生法輪經云吾觀至學士乃不領人懷太上八素真經云靈文秘重不敢閉塞不敢輕傳如按年限動有劫年於至學之士永無其縁有絶思之嘆勤而無成至於元始開化難遇其人厲以玄科之㫖遇合便授貧道靈寳真一自然經訣云夫人求仙道積功無厭多功滿自然得道學道猶世人憂居貧無不得仙者也言則貧道汲汲唯道是務常與心諍以制衆魔華想貧道之言蓋上清道士之通稱也定志經云山南道士答樂法解曰貧道昨夜下講於卧中得夢見有一人持一真財如意授以與卿卿即受之貧道思惟謂是佳瑞太上太霄琅書經云道士謙辭於道未富自言貧道亦貧士理未周足如未周我獨若遺故爲貧士士之爲理修善爲事宗匠本願大戒經云太極真人答高玄真人曰吾忝受教化愧不足彼宗匠今釋彼者謂葛仙公太上有命何敢不傾藴哉太上太真科經云聖匠悲念申明經科前后相證解惑釋疑治邪輔正白黑歷然黄老玄示經云德有知不知者道之所尚后下皆謂知之爲知世轉相仿也莫知之爲知也乃舍知之玄匠也常於不知弟子太平經云夫師弟子其功大重此若父母生子不可謝而解也夫人得生不事善師及事愚師乃教人以惡入邪中或使人死滅身尚有餘罪并盡其家也人或生而不知學問遂成愚人夫無知之人但獨愁苦有遇於地下魂魄不得游樂身死不得成於善鬼今善師學人也乃使下愚人成於善人善而不止更得成賢賢而不止乃得次聖聖而不止乃知真道守道不止乃仙不死仙而不止乃得成真真而不止乃得成神神而不止乃與天比天比不止乃得與元氣比其得比元炁乃包裹天地八地八方莫不受其炁而生其德乃復覆蓋天地八方精神乃從天地飲食天下莫不共祭食之尚恐駭不能致之也是至善師生善弟子之功也又云爲人弟子旦夕順謹隨師之教不失銖分不敢妄說亂師之出入不敢爲師致憂從見教於師之後不敢犯非無有惡音不逆師心是爲上善弟子也意真人言幾類似之是非上善之弟子也才應中善之弟子耳然上善之弟子也受師道教之後念縁師恩遂得成人乃得長與賢仙相隨不失行伍或得官位以報父母或得深入道知自養之術也夫乃得生於父母得成道德於師得榮尊於君每獨居一處念君父師之將老無有可以報復之者常思爲師得殊方異文可以報功每悔念之正心痛也故行更學奉事賢者囑托其師爲其言語或使師上得國家之良輔又有益帝王之治若此乃應上古之善弟子也靈寳大戒經云授我十戒行十二可從則爲大道清信弟子見在世上可得免於憂惱度於衆苦身入光明形内澄正召鬼使神制伏魔精又云飛天未得道者也是道十轉弟子飛行空虚爲諸天策駕十轉即得上爲飛天若在一轉而行精進心不懈退作諸功德長齋苦行晨夕不倦即得飛天於此而進超凌三界爲上清真人太上八素真經云凡遵三景稱三境弟子已度三人委付師友已後傳授得稱三景法師先生真人隨師所命朋友所薦乃得稱之未經表奏不得妄稱尸解九天生神章經云夫學上道希慕神仙及得尸解滅度轉輪終歸仙道形與神同不相遠離俱入道真明真科經云生世好學修行經教吞精咽炁恒無怠倦持齋服御吐納自煉積功布德名書上清致得尸解下仙游行五嶽後生人中更受經法爲人師宗輪轉道備克得上仙白日飛行位及高貴太微金簡玉字經云諸尸解地下主者案四極真科一百四十年乃得補真官於是始得飛華蓋乘群龍登太極游九宫也太極真人飛仙寳劎上經云夫尸解者尸形之化也本真之煉蛻也軀質之遯變也五屬之隱適也雖是仙品之下第而其禀受所承未必輕也或未欲升天而高栖名山或欲崇明世教令生死道絶欲斷子孫之近戀盡神仙爲難希或欲長觀世化憚仙官之劬勞也妙道一備高下位適固不可用明死生以制其定格也所謂隱回三光白日陸沉者也又云以録形靈丸涂火炭則他人見形而燒死謂之火尸解以一丸和水而飲之抱木而卧則他人見已傷死於空室中謂之兵尸解凡百縱任故自得還故邑也當改姓名變容貌耳昔有人作此法入林慮山積十三年而復還家也大修下尸解者皆不得反望故鄉此爲上解之道名配紫簡三官不得復窺其間隙妄以死加之也有死而更生者有頭斷已死乃從一旁出者死畢未斂而去失尸骸者有人形猶存而無復骨者有衣在形去者有髮脫而失形者白日去謂之上尸解夜半去者謂之下尸解向曉向暮之際而去者謂之地下主者也此皆迹兆不滅爲人所疑雖獲隱遯令世志未厭又不得反旋故鄉游栖靡定主者太極真人飛仙寳劎上經云夫至忠至孝之人既終皆受書爲地下主者一百四十年乃得受下仙之教授以大道從此漸進得補仙官一百四十年聽一試進也至孝者能感激鬼神使百鳥山獸逃其墳塚也至忠者能公犯直心精貫白日或剖藏殺身以激其君者也夫有上聖之德既終皆受三官書爲地下主者一千年乃轉補三官之五帝或爲東西南北明公以治鬼神復一千四百年乃得游行太清爲九宫之中仙也夫有蕭邈之才有絶衆之望養其浩然不營榮貴者既終受三官書爲善爽之鬼四百年乃得爲地下主者從此以進以三百年爲一階也夫有至廉至貞之才者既終受三官書爲清鬼二百八十年乃得爲地下主者從此以漸得進補仙官以二百八十年爲一階也夫至廉者不食非己之食不衣非己之布帛也夫至貞者紛華不能散其正炁萬乘不能激其名操也先世有功在三官流逮後嗣或易世煉化改氏更生者此七世隂德葉根相及也既終當遺脚骨以歸三官余骨隨身而遷也男留左骨女留右骨皆受書爲地下主者二百八十年乃得進受地仙之道矣臨終之日視其形如生人之肉既死之時尸不强直足指不青手皮不皺者謂之先有德行自然得尸解者也道典論卷之二
